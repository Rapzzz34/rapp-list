openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Drakor & Webtoon List API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: media
    description: Media list operations
  - name: Storage
    description: Object storage upload and serving endpoints.
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /media:
    get:
      operationId: listMedia
      tags: [media]
      summary: List all media items
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: genre
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of media items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MediaItem"
    post:
      operationId: createMedia
      tags: [media]
      summary: Create a new media item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MediaInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaItem"

  /media/{id}:
    get:
      operationId: getMedia
      tags: [media]
      summary: Get a single media item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Media item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaItem"
        "404":
          description: Not found
    patch:
      operationId: updateMedia
      tags: [media]
      summary: Update a media item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MediaUpdate"
      responses:
        "200":
          description: Updated media item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaItem"
        "404":
          description: Not found
    delete:
      operationId: deleteMedia
      tags: [media]
      summary: Delete a media item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /media/{id}/analyze:
    get:
      operationId: analyzeMedia
      tags: [media]
      summary: AI analysis — cast, synopsis, platform for a media item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: AI analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaAnalysis"
        "404":
          description: Not found
        "503":
          description: AI unavailable

  /media/stats/summary:
    get:
      operationId: getMediaStats
      tags: [media]
      summary: Get summary stats by category and status
      responses:
        "200":
          description: Stats summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaStats"

  /media/stats/detailed:
    get:
      operationId: getDetailedStats
      tags: [media]
      summary: Get detailed stats — monthly completions, genres, streak, hours
      responses:
        "200":
          description: Detailed stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DetailedStats"

  /media/export:
    get:
      operationId: exportMedia
      tags: [media]
      summary: Export all media items as JSON
      responses:
        "200":
          description: All media items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MediaItem"

  /media/bulk-import:
    post:
      operationId: bulkImportMedia
      tags: [media]
      summary: Bulk import media items from a list of titles
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkImportRequest"
      responses:
        "200":
          description: Import result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkImportResult"

  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadUrlRequest'
      responses:
        '200':
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadUrlResponse'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Failed to generate upload URL.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /storage/objects/{objectPath}:
    get:
      tags: [Storage]
      operationId: getStorageObject
      summary: Serve an object entity from PRIVATE_OBJECT_DIR
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Object content streamed.
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '404':
          description: Object not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /media/genres/list:
    get:
      operationId: listGenres
      tags: [media]
      summary: List all distinct genres used
      responses:
        "200":
          description: Genre list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

components:
  schemas:
    MediaAnalysis:
      type: object
      required: [title, category, synopsis, cast, platform, year, country]
      properties:
        title:
          type: string
        category:
          type: string
        synopsis:
          type: string
          description: 2-3 kalimat sinopsis dalam Bahasa Indonesia
        cast:
          type: array
          items:
            type: object
            required: [name, actor, role]
            properties:
              name:
                type: string
                description: Nama karakter
              actor:
                type: string
                description: Nama aktor/aktris
              role:
                type: string
                description: main | supporting
        platform:
          type: string
          description: Platform streaming (Netflix, Viki, WeTV, dll)
        year:
          type: string
        country:
          type: string
        totalEpisodes:
          type: integer

    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    MediaItem:
      type: object
      required: [id, title, category, status, createdAt]
      properties:
        id:
          type: integer
        title:
          type: string
        category:
          type: string
          description: drakor | webtoon | short-dracin | indo
        genre:
          type: ["string", "null"]
        status:
          type: string
          description: plan-to-watch | watching | completed | dropped
        rating:
          type: ["integer", "null"]
          description: 1-10
        notes:
          type: ["string", "null"]
        totalEpisodes:
          type: ["integer", "null"]
        currentEpisode:
          type: ["integer", "null"]
        imageUrl:
          type: ["string", "null"]
          description: URL to poster/cover image
        tags:
          type: ["string", "null"]
          description: Comma-separated custom tags
        startDate:
          type: ["string", "null"]
          description: ISO date YYYY-MM-DD, auto-set when status → watching
        endDate:
          type: ["string", "null"]
          description: ISO date YYYY-MM-DD, auto-set when status → completed
        createdAt:
          type: string
        updatedAt:
          type: ["string", "null"]

    MediaInput:
      type: object
      required: [title, category, status]
      properties:
        title:
          type: string
          minLength: 1
        category:
          type: string
        genre:
          type: string
        status:
          type: string
        rating:
          type: integer
        notes:
          type: string
        totalEpisodes:
          type: integer
        currentEpisode:
          type: integer
        imageUrl:
          type: string
        tags:
          type: string
        startDate:
          type: string
          description: ISO date YYYY-MM-DD
        endDate:
          type: string
          description: ISO date YYYY-MM-DD

    MediaUpdate:
      type: object
      properties:
        title:
          type: string
          minLength: 1
        category:
          type: string
        genre:
          type: string
        status:
          type: string
        rating:
          type: integer
        notes:
          type: string
        totalEpisodes:
          type: integer
        currentEpisode:
          type: integer
        imageUrl:
          type: string
        tags:
          type: string
        startDate:
          type: string
        endDate:
          type: string

    BulkImportRequest:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/MediaInput"

    BulkImportResult:
      type: object
      required: [created, failed]
      properties:
        created:
          type: integer
        failed:
          type: integer

    DetailedStats:
      type: object
      required: [monthly, genres, avgRating, totalEpisodes, estimatedHours, streak]
      properties:
        monthly:
          type: array
          items:
            $ref: "#/components/schemas/MonthlyStats"
        genres:
          type: array
          items:
            $ref: "#/components/schemas/GenreStat"
        avgRating:
          type: number
        totalEpisodes:
          type: integer
        estimatedHours:
          type: number
        streak:
          type: integer

    MonthlyStats:
      type: object
      required: [month, count]
      properties:
        month:
          type: string
        count:
          type: integer

    GenreStat:
      type: object
      required: [genre, count]
      properties:
        genre:
          type: string
        count:
          type: integer

    UploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
          minLength: 1
        size:
          type: integer
          minimum: 1
        contentType:
          type: string
          minLength: 1
    UploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
          format: uri
        objectPath:
          type: string
        metadata:
          $ref: '#/components/schemas/UploadUrlRequest'
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string

    CategoryStats:
      type: object
      required: [category, total, completed, watching, planToWatch, dropped]
      properties:
        category:
          type: string
        total:
          type: integer
        completed:
          type: integer
        watching:
          type: integer
        planToWatch:
          type: integer
        dropped:
          type: integer

    MediaStats:
      type: object
      required: [categories, totalAll]
      properties:
        totalAll:
          type: integer
        categories:
          type: array
          items:
            $ref: "#/components/schemas/CategoryStats"
